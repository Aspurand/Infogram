<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="InfoGram">
<meta name="theme-color" content="#f4f1eb" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1f1a" media="(prefers-color-scheme: dark)">
<title>InfoGram</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── NATURE CALM THEME — AUTO LIGHT/DARK ── */
:root{
  /* Light mode (default) */
  --bg:#f4f1eb;--bg-card:#ffffff;--bg-card-hover:#f0ede6;--bg-input:#ffffff;
  --border:#e0dbd2;--border-strong:#c8c2b6;
  --text:#2c3e2c;--text-dim:#6b7d6b;--text-muted:#9ba89b;
  --accent:#3d8b37;--accent-light:#5ba854;--accent-glow:rgba(61,139,55,0.15);--accent-soft:rgba(61,139,55,0.08);
  --green:#2d8a4e;--red:#c0392b;--amber:#d4a017;--blue:#2e86ab;
  --pink:#c44569;--orange:#e17055;--cyan:#00b4d8;
  --shadow:0 2px 12px rgba(44,62,44,0.06);--shadow-lg:0 8px 30px rgba(44,62,44,0.1);
  --header-bg:rgba(244,241,235,0.92);--nav-bg:rgba(244,241,235,0.96);
  --hero-fallback:linear-gradient(135deg,#e8f5e9,#f1f8e9,#fff8e1);
  --formula-bg:rgba(61,139,55,0.05);--formula-border:rgba(61,139,55,0.15);--formula-text:#2d6a2e;
  --insight-bg:linear-gradient(135deg,rgba(45,138,78,0.06),rgba(45,138,78,0.02));--insight-border:rgba(45,138,78,0.18);
  --code-bg:rgba(61,139,55,0.07);--code-border:rgba(61,139,55,0.12);--code-text:#2d6a2e;
  --action-bg:rgba(255,255,255,0.85);--action-border:rgba(0,0,0,0.06);
  --radius:16px;--radius-sm:12px;
  --header-h:56px;--nav-h:64px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1f1a;--bg-card:#232a23;--bg-card-hover:#2a332a;--bg-input:#232a23;
    --border:#3a4a3a;--border-strong:#4a5c4a;
    --text:#e0e8e0;--text-dim:#8fa88f;--text-muted:#5c725c;
    --accent:#6abf62;--accent-light:#82d47a;--accent-glow:rgba(106,191,98,0.18);--accent-soft:rgba(106,191,98,0.08);
    --green:#6abf62;--red:#ff6b6b;--amber:#ffd43b;--blue:#74c0fc;
    --pink:#f06595;--orange:#ff922b;--cyan:#66d9e8;
    --shadow:0 2px 12px rgba(0,0,0,0.2);--shadow-lg:0 8px 30px rgba(0,0,0,0.3);
    --header-bg:rgba(26,31,26,0.92);--nav-bg:rgba(26,31,26,0.96);
    --hero-fallback:linear-gradient(135deg,#1e2a1e,#232a23,#2a2a1e);
    --formula-bg:rgba(106,191,98,0.06);--formula-border:rgba(106,191,98,0.15);--formula-text:#82d47a;
    --insight-bg:linear-gradient(135deg,rgba(106,191,98,0.08),rgba(106,191,98,0.03));--insight-border:rgba(106,191,98,0.2);
    --code-bg:rgba(106,191,98,0.08);--code-border:rgba(106,191,98,0.12);--code-text:#82d47a;
    --action-bg:rgba(35,42,35,0.85);--action-border:rgba(255,255,255,0.06);
  }
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;transition:background 0.3s,color 0.3s}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ── AUTH ── */
.auth-screen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center;background:var(--bg)}
.auth-logo{font-size:56px;margin-bottom:14px;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(-2deg)}75%{transform:translateY(-4px) rotate(2deg)}}
.auth-title{font-size:34px;font-weight:700;font-family:'Lora',Georgia,serif;letter-spacing:-0.5px;margin-bottom:4px;color:var(--accent)}
.auth-sub{font-size:14px;color:var(--text-dim);margin-bottom:32px;line-height:1.6}
.auth-form{width:100%;max-width:340px}
.auth-input{width:100%;padding:14px 18px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Nunito',sans-serif;font-size:16px;outline:none;transition:border-color 0.3s,box-shadow 0.3s;margin-bottom:12px;-webkit-appearance:none}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.auth-input::placeholder{color:var(--text-muted)}
.auth-btn{width:100%;padding:15px;border:none;border-radius:50px;background:var(--accent);color:white;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:var(--shadow-lg);margin-top:4px}
.auth-btn:hover{background:var(--accent-light)}
.auth-btn:active{transform:scale(0.97)}
.auth-toggle{margin-top:18px;font-size:13px;color:var(--text-dim)}
.auth-toggle span{color:var(--accent);cursor:pointer;font-weight:700}
.auth-error{color:var(--red);font-size:13px;margin-bottom:10px;min-height:18px}

/* ── HEADER ── */
.header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;height:calc(var(--header-h) + var(--safe-top));padding-top:var(--safe-top);background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:relative;z-index:50}
.header-left{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:26px}
.header-left h1{font-size:22px;font-weight:700;font-family:'Lora',Georgia,serif;color:var(--accent);letter-spacing:-0.3px}
.header-right{display:flex;gap:8px;align-items:center}
.hdr-btn{height:36px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all 0.2s;padding:0 14px;gap:6px;font-family:'Nunito',sans-serif;font-weight:700;box-shadow:var(--shadow)}
.hdr-btn:active{transform:scale(0.94);background:var(--bg-card-hover)}
.hdr-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}

/* ── BOTTOM NAV ── */
.bottom-nav{flex-shrink:0;display:flex;justify-content:space-around;align-items:center;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;transition:all 0.2s;border-radius:14px;position:relative}
.nav-item:active{transform:scale(0.9)}
.nav-icon{font-size:22px;transition:all 0.2s}
.nav-label{font-size:10px;font-weight:700;color:var(--text-muted);transition:all 0.2s;letter-spacing:0.3px}
.nav-item.active{background:var(--accent-soft)}
.nav-item.active .nav-icon{transform:scale(1.1)}
.nav-item.active .nav-label{color:var(--accent)}
.saved-count{position:absolute;top:0;right:6px;min-width:16px;height:16px;border-radius:8px;background:var(--red);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

.main{flex:1;overflow:hidden;position:relative}

/* ── REELS ── */
.reels-container{height:100%;overflow:hidden;position:relative;touch-action:pan-y}
.reel-slide{height:100%;width:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;position:absolute;top:0;left:0;display:flex;flex-direction:column;transition:transform 0.35s ease,opacity 0.35s ease}
.reel-slide::-webkit-scrollbar{display:none}
.reel-slide.slide-out-left{transform:translateX(-100%);opacity:0}
.reel-slide.slide-out-right{transform:translateX(100%);opacity:0}
.reel-slide.slide-in-left{animation:slideFromRight 0.35s ease forwards}
.reel-slide.slide-in-right{animation:slideFromLeft 0.35s ease forwards}
@keyframes slideFromRight{from{transform:translateX(50px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideFromLeft{from{transform:translateX(-50px);opacity:0}to{transform:translateX(0);opacity:1}}

.reel-content{flex:1;padding:20px 20px 24px;display:flex;flex-direction:column;min-height:100%}
.reel-topic-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.reel-topic-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:var(--shadow)}
.reel-topic-name{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.reel-topic-meta{font-size:11px;color:var(--text-muted);margin-top:2px;font-weight:500}
.reel-difficulty{margin-left:auto;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
.reel-title{font-size:26px;font-weight:700;font-family:'Lora',Georgia,serif;line-height:1.3;letter-spacing:-0.3px;margin-bottom:18px;color:var(--text)}
.reel-hero-image{width:calc(100% + 40px);margin-left:-20px;margin-bottom:20px;height:220px;object-fit:cover;border-radius:0;background:var(--hero-fallback)}

.reel-body{flex:1}
.reel-body p{margin-bottom:16px;font-size:15.5px;line-height:1.85;color:var(--text-dim);font-weight:400}
.reel-body h3{font-size:18px;font-weight:700;font-family:'Lora',Georgia,serif;color:var(--text);margin:28px 0 12px;padding-left:14px;border-left:3px solid var(--accent);border-radius:0 4px 4px 0}
.reel-body strong{color:var(--text);font-weight:700}
.reel-body code{background:var(--code-bg);padding:3px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--code-text);border:1px solid var(--code-border)}
.reel-body .formula-block{background:var(--formula-bg);border:1px solid var(--formula-border);border-radius:var(--radius-sm);padding:18px 20px;margin:18px 0;font-family:'JetBrains Mono',monospace;font-size:13.5px;color:var(--formula-text);line-height:1.9;overflow-x:auto}
.reel-body .key-insight{background:var(--insight-bg);border:1px solid var(--insight-border);border-radius:var(--radius-sm);padding:18px 20px;margin:18px 0;font-size:14.5px;line-height:1.75}
.reel-body .key-insight::before{content:'🌿 Key Insight';display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;color:var(--green);margin-bottom:8px;font-family:'Nunito',sans-serif}

/* ── ACTIONS ── */
.reel-actions{position:fixed;right:14px;bottom:calc(var(--nav-h) + var(--safe-bottom) + 20px);display:flex;flex-direction:column;gap:16px;z-index:40;align-items:center}
.reel-action-btn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all 0.2s}
.reel-action-btn:active{transform:scale(0.85)}
.reel-action-icon{width:48px;height:48px;border-radius:50%;background:var(--action-bg);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid var(--action-border);transition:all 0.3s;box-shadow:var(--shadow)}
.reel-action-icon.liked{background:rgba(192,57,43,0.12);border-color:rgba(192,57,43,0.25)}
.reel-action-icon.saved{background:rgba(212,160,23,0.12);border-color:rgba(212,160,23,0.25)}
.reel-action-label{font-size:10px;font-weight:700;color:var(--text-muted)}

/* ── SWIPE HINT ── */
.swipe-hint{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;animation:bounceHint 2.5s ease infinite;z-index:30;pointer-events:none;background:var(--action-bg);backdrop-filter:blur(10px);padding:6px 14px;border-radius:20px;border:1px solid var(--action-border)}
@keyframes bounceHint{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}

/* ── PROGRESS ── */
.progress-bar{position:fixed;top:calc(var(--header-h) + var(--safe-top) + 8px);left:16px;right:16px;display:flex;gap:4px;z-index:40}
.progress-seg{flex:1;height:3px;border-radius:2px;background:var(--border);overflow:hidden;min-width:4px}
.progress-seg.done{background:var(--accent)}
.progress-seg.active .pfill{height:100%;background:var(--accent);border-radius:2px;animation:pgrow 15s linear forwards}
@keyframes pgrow{from{width:0}to{width:100%}}

/* ── PAGE / SCROLL ── */
.page-container{height:100%;overflow-y:auto;padding:16px}
.page-container::-webkit-scrollbar{display:none}
.section-title{font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* ── ONBOARDING ── */
.onboarding{height:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.ob-header{padding:20px 24px 0;text-align:center;flex-shrink:0}
.ob-title{font-size:22px;font-weight:700;font-family:'Lora',Georgia,serif;margin-bottom:4px;color:var(--accent)}
.ob-sub{font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.5}
.ob-search{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);margin:0 24px 4px;transition:border-color 0.2s,box-shadow 0.2s;box-shadow:var(--shadow)}
.ob-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.ob-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px}
.ob-search input::placeholder{color:var(--text-muted)}
.ob-count{padding:4px 24px 2px;font-size:12px;color:var(--text-dim);flex-shrink:0;font-weight:600}
.ob-count strong{color:var(--accent)}
.ob-scroll{flex:1;overflow-y:auto;padding:6px 24px 120px;-webkit-overflow-scrolling:touch}
.ob-scroll::-webkit-scrollbar{display:none}
.ob-cat{font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px}
.ob-cat:first-child{margin-top:2px}
.ob-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:2px}
.ob-t{padding:10px 6px;border-radius:var(--radius-sm);border:2px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all 0.25s;text-align:center;position:relative;box-shadow:var(--shadow)}
.ob-t:active{transform:scale(0.95)}
.ob-t.sel{border-color:var(--accent);background:var(--accent-soft)}
.ob-t-i{font-size:22px;margin-bottom:3px;display:block}
.ob-t-l{font-size:10px;font-weight:600;color:var(--text-dim);display:block;line-height:1.25}
.ob-t.sel .ob-t-l{color:var(--text);font-weight:700}
.ob-t-c{position:absolute;top:3px;right:3px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:white;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
.ob-t.sel .ob-t-c{opacity:1}
.ob-footer{position:fixed;bottom:0;left:0;right:0;padding:10px 24px calc(14px + var(--safe-bottom));background:linear-gradient(transparent,var(--bg) 30%);z-index:10}
.ob-start{width:100%;padding:15px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:all 0.3s}
.ob-start.ready{background:var(--accent);color:white;box-shadow:var(--shadow-lg)}
.ob-start.ready:hover{background:var(--accent-light)}
.ob-start:not(.ready){background:var(--bg-card);color:var(--text-muted);border:1px solid var(--border);cursor:default}

/* ── EXPLORE ── */
.explore-search{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color 0.2s;box-shadow:var(--shadow)}
.explore-search:focus-within{border-color:var(--accent)}
.explore-search input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;font-size:15px}
.explore-search input::placeholder{color:var(--text-muted)}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.tcard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 12px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.tcard:active{transform:scale(0.96)}
.tcard.sub{border-color:var(--accent);background:var(--accent-soft)}
.tcard-chk{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.tcard.sub .tcard-chk{background:var(--accent);color:white}
.tcard:not(.sub) .tcard-chk{background:var(--bg);border:1.5px solid var(--border);color:transparent}

/* ── SAVED ── */
.saved-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;display:flex;gap:12px;box-shadow:var(--shadow)}
.saved-card:active{transform:scale(0.98);background:var(--bg-card-hover)}
.saved-card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.saved-card-info{flex:1;min-width:0}
.saved-card-title{font-size:14px;font-weight:700;font-family:'Lora',Georgia,serif;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-card-meta{font-size:11px;color:var(--text-dim);font-weight:500}
.saved-card-rm{align-self:center;color:var(--text-muted);font-size:18px;cursor:pointer;padding:6px;border-radius:8px}

/* ── LOADING ── */
.loading-reel{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.empty-state{text-align:center;padding:60px 24px}
.empty-state-icon{font-size:48px;margin-bottom:14px}
.empty-state-title{font-size:18px;font-weight:700;font-family:'Lora',Georgia,serif;color:var(--text-dim);margin-bottom:7px}
.empty-state-desc{font-size:13px;color:var(--text-muted);line-height:1.6}

/* ── DATE NAV ── */
.date-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 16px;flex-shrink:0}
.date-btn{width:34px;height:34px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;box-shadow:var(--shadow)}
.date-btn:active{background:var(--bg-card-hover)}
.date-btn:disabled{opacity:0.2;cursor:default}
.date-label{font-size:14px;font-weight:600;color:var(--text-dim)}
.date-label strong{color:var(--text)}

@media(min-width:600px){.reel-content{max-width:580px;margin:0 auto}.reel-actions{right:calc(50% - 310px)}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// INFOGRAM v5 — Nature Calm Theme
// ═══════════════════════════════════════════════════════════════

const COLORS=["#3d8b37","#2d8a4e","#e17055","#2e86ab","#d4a017","#c44569","#00b4d8","#5ba854","#c0392b","#27ae60","#f39c12","#8e44ad","#1abc9c","#e74c3c","#3498db","#e67e22","#9b59b6","#16a085","#e84393","#6c5ce7","#fdcb6e","#00cec9","#a29bfe","#74b9ff","#fab1a0","#55efc4","#dfe6e9","#81ecec","#ffeaa7","#636e72"];

const CATEGORIES={
  "🧠 AI & Computing":[
    {id:"ai",label:"Artificial Intelligence",icon:"🧠",img:"artificial+intelligence+neural"},
    {id:"machine-learning",label:"Machine Learning",icon:"🤖",img:"machine+learning+algorithm"},

const TOPICS=[];let _ci=0;
for(const[cat,items] of Object.entries(CATEGORIES)){for(const item of items){TOPICS.push({...item,color:COLORS[_ci%COLORS.length],category:cat});_ci++}}
const TOPIC_MAP={};TOPICS.forEach(t=>TOPIC_MAP[t.id]=t);

// ── STATE ──
let user=null;
let S={view:"feed",topics:[],weights:{},savedPosts:[],likedIds:new Set(),currentIndex:0,swipeHintShown:false,_obSel:[],_obQ:"",_exQ:""};
let posts=[];let loadedDate="";

// ── AUTH ──
function hashPw(pw){let h=0;for(let i=0;i<pw.length;i++)h=((h<<5)-h+pw.charCodeAt(i))|0;return h.toString(36)}
function getUsers(){try{return JSON.parse(localStorage.getItem("ig-users")||"{}")}catch(e){return{}}}
function saveUsers(u){localStorage.setItem("ig-users",JSON.stringify(u))}
function login(username,password){const users=getUsers();const h=hashPw(password);if(users[username]&&users[username].hash!==h)return"Wrong password";if(!users[username])users[username]={hash:h,created:Date.now()};saveUsers(users);user={username};localStorage.setItem("ig-current",username);loadUserData();return null}
function logout(){user=null;localStorage.removeItem("ig-current");render()}
function loadUserData(){if(!user)return;const k="ig-u-"+user.username;try{const d=JSON.parse(localStorage.getItem(k)||"{}");S.topics=d.topics||[];S.weights=d.weights||{};S.savedPosts=d.saved||[];S.likedIds=new Set(d.liked||[]);S.view=S.topics.length?"feed":"onboarding"}catch(e){S.view="onboarding"}}
function saveUserData(){if(!user)return;localStorage.setItem("ig-u-"+user.username,JSON.stringify({topics:S.topics,weights:S.weights,saved:S.savedPosts,liked:[...S.likedIds]}))}

// ── POSTS ──
function todayStr(){const d=new Date();return d.toISOString().slice(0,10)}
function dateStr(offset){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
async function loadPosts(date){if(!date)date=todayStr();loadedDate=date;try{const resp=await fetch(`posts/${date}.json?v=${Date.now()}`);if(!resp.ok)throw new Error("not found");posts=await resp.json()}catch(e){if(date===todayStr()){try{const y=dateStr(-1);const r2=await fetch(`posts/${y}.json?v=${Date.now()}`);if(r2.ok){posts=await r2.json();loadedDate=y}else posts=[]}catch(e2){posts=[]}}else posts=[]}S.currentIndex=0;sortPostsForUser();render()}
function sortPostsForUser(){if(!S.topics.length||!posts.length)return;const us=new Set(S.topics);const mine=[],rest=[];for(const p of posts){if(us.has(p.topicId))mine.push(p);else rest.push(p)}for(let i=rest.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rest[i],rest[j]]=[rest[j],rest[i]]}mine.sort((a,b)=>(S.weights[b.topicId]||1)-(S.weights[a.topicId]||1));posts=[...mine,...rest]}

// ── ACTIONS ──
function boostTopic(tid){S.weights[tid]=(S.weights[tid]||1)+0.2;saveUserData()}
function toggleLike(id,tid){if(S.likedIds.has(id))S.likedIds.delete(id);else{S.likedIds.add(id);boostTopic(tid)}saveUserData();render()}
function toggleSave(id){if(S.savedPosts.find(p=>p.id===id)){S.savedPosts=S.savedPosts.filter(p=>p.id!==id)}else{const post=posts.find(p=>p.id===id);if(post){S.savedPosts.unshift({...post,savedAt:Date.now()});boostTopic(post.topicId)}}saveUserData();render()}

function formatContent(text){if(!text)return"";return text.replace(/\[FORMULA\]([\s\S]*?)\[\/FORMULA\]/g,'<div class="formula-block">$1</div>').replace(/\[INSIGHT\]([\s\S]*?)\[\/INSIGHT\]/g,'<div class="key-insight">$1</div>').replace(/^## (.+)$/gm,'<h3>$1</h3>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').split("\n").filter(l=>l.trim()).map(l=>{const t=l.trim();if(t.startsWith("<h3>")||t.startsWith("<div"))return t;return"<p>"+t+"</p>"}).join("")}

function render(){const app=document.getElementById("app");if(!user){renderAuth(app);return}if(S.view==="onboarding"){renderOnboarding(app);return}renderApp(app)}

let authMode="login",authErr="";
function renderAuth(app){
  app.innerHTML=`<div class="auth-screen">
    <div class="auth-logo">🌿</div>
    <h1 class="auth-title">InfoGram</h1>
    <p class="auth-sub">Your daily knowledge garden.<br>Fresh deep-dive articles every morning.</p>
    <div class="auth-form">
      <div class="auth-error">${authErr}</div>
      <input class="auth-input" id="authUser" type="text" placeholder="Username" autocomplete="username" autofocus>
      <input class="auth-input" id="authPw" type="password" placeholder="Password" autocomplete="current-password">
      <button class="auth-btn" onclick="doAuth()">${authMode==="login"?"Sign In":"Create Account"}</button>
      <div class="auth-toggle">${authMode==="login"?`New here? <span onclick="authMode='signup';authErr='';render()">Create account</span>`:`Have an account? <span onclick="authMode='login';authErr='';render()">Sign in</span>`}</div>
    </div>
  </div>`;
  document.getElementById("authPw").addEventListener("keydown",e=>{if(e.key==="Enter")doAuth()});
}

window.doAuth=function(){const u=document.getElementById("authUser").value.trim().toLowerCase();const p=document.getElementById("authPw").value;if(!u||u.length<2){authErr="Username must be at least 2 characters";render();return}if(!p||p.length<3){authErr="Password must be at least 3 characters";render();return}const users=getUsers();if(authMode==="signup"&&users[u]){authErr="Username taken. Try signing in.";render();return}if(authMode==="login"&&!users[u]){authErr="No account found. Create one first.";render();return}const err=login(u,p);if(err){authErr=err;render();return}authErr="";loadPosts()};

function renderOnboarding(app){const sel=S._obSel;const q=S._obQ.toLowerCase();let catHTML="";for(const[cat,items] of Object.entries(CATEGORIES)){const filt=q?items.filter(t=>t.label.toLowerCase().includes(q)||t.id.includes(q)):items;if(!filt.length)continue;catHTML+=`<div class="ob-cat">${cat}</div><div class="ob-grid">`;for(const t of filt)catHTML+=`<div class="ob-t ${sel.includes(t.id)?'sel':''}" onclick="togOB('${t.id}')"><span class="ob-t-c">✓</span><span class="ob-t-i">${t.icon}</span><span class="ob-t-l">${t.label}</span></div>`;catHTML+=`</div>`}
  app.innerHTML=`<div class="onboarding"><div class="ob-header"><div style="font-size:28px;margin-bottom:6px">🌿 Welcome, ${user.username}!</div><div class="ob-title">Pick Your Interests</div><p class="ob-sub">Choose 3+ topics for your personalized garden.</p></div><div class="ob-search"><span style="color:var(--text-muted)">🔍</span><input type="text" placeholder="Search ${TOPICS.length} topics..." value="${S._obQ}" oninput="S._obQ=this.value;render()"></div><div class="ob-count"><strong>${sel.length}</strong> selected${sel.length<3?` · pick ${3-sel.length} more`:' ✓'}</div><div class="ob-scroll">${catHTML}</div><div class="ob-footer"><button class="ob-start ${sel.length>=3?'ready':''}" onclick="${sel.length>=3?'finishOB()':''}">${sel.length<3?`Pick ${3-sel.length} more`:'Start Reading →'}</button></div></div>`}
window.togOB=function(id){const i=S._obSel.indexOf(id);if(i>=0)S._obSel.splice(i,1);else S._obSel.push(id);render()};
window.finishOB=function(){S.topics=[...S._obSel];S.weights={};S.topics.forEach(t=>S.weights[t]=1);S.view="feed";saveUserData();sortPostsForUser();render()};

function renderApp(app){const v=S.view;
  app.innerHTML=`<div class="header"><div class="header-left"><span class="logo-icon">🌿</span><h1>InfoGram</h1></div><div class="header-right"><div class="hdr-btn" onclick="logout()"><div class="hdr-avatar">${user.username[0].toUpperCase()}</div>${user.username}<span style="margin-left:4px;font-size:11px;color:var(--text-muted)">✕</span></div></div></div>
    ${v==="feed"?renderDateNav():''}
    <div class="main" id="mainArea">${v==="feed"?renderFeed():''}${v==="saved"?renderSaved():''}${v==="explore"?renderExplore():''}</div>
    <div class="bottom-nav">
      <div class="nav-item ${v==="feed"?'active':''}" onclick="nav('feed')"><span class="nav-icon">🏠</span><span class="nav-label">Feed</span></div>
      <div class="nav-item ${v==="explore"?'active':''}" onclick="nav('explore')"><span class="nav-icon">🧭</span><span class="nav-label">Explore</span></div>
      <div class="nav-item ${v==="saved"?'active':''}" onclick="nav('saved')" style="position:relative"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span>${S.savedPosts.length?`<span class="saved-count">${S.savedPosts.length}</span>`:''}</div>
    </div>`;
  if(v==="feed")initSwipe()}
window.nav=function(v){S.view=v;render()};

function renderDateNav(){const isToday=loadedDate===todayStr();const d=new Date(loadedDate+"T12:00:00");const label=isToday?"Today":d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});return`<div class="date-nav"><button class="date-btn" onclick="goDate(-1)">‹</button><div class="date-label"><strong>${label}</strong> · ${posts.length} articles</div><button class="date-btn" onclick="goDate(1)" ${isToday?'disabled':''}>›</button></div>`}
window.goDate=function(dir){const d=new Date(loadedDate+"T12:00:00");d.setDate(d.getDate()+dir);const ds=d.toISOString().slice(0,10);if(ds>todayStr())return;loadPosts(ds)};

function renderFeed(){
  if(!posts.length)return`<div class="loading-reel"><div class="empty-state-icon">🌱</div><div style="font-size:14px;color:var(--text-dim);text-align:center">No articles for this date yet.<br>Try going back a day.</div></div>`;
  const post=posts[S.currentIndex];if(!post)return'';
  const topic=TOPIC_MAP[post.topicId]||TOPICS[0];
  const isSvd=S.savedPosts.some(p=>p.id===post.id);const isLkd=S.likedIds.has(post.id);
  const isFollowed=S.topics.includes(post.topicId);
  const imgQ=post.imageQuery||topic.img||"nature+knowledge";
  const imgUrl=post.imageUrl||`https://source.unsplash.com/800x450/?${encodeURIComponent(imgQ)}&sig=${encodeURIComponent(post.id||post.title)}`;
  const maxD=Math.min(posts.length,20);const dS=Math.max(0,S.currentIndex-10);const dE=Math.min(posts.length,dS+maxD);const dots=posts.slice(dS,dE);

  return`
    <div class="progress-bar">${dots.map((_,i)=>{const ri=dS+i;return`<div class="progress-seg ${ri<S.currentIndex?'done':''} ${ri===S.currentIndex?'active':''}">${ri===S.currentIndex?'<div class="pfill"></div>':''}</div>`}).join("")}</div>
    <div class="reels-container" id="reelsC">
      <div class="reel-slide" id="curReel">
        <div class="reel-content">
          <div class="reel-topic-bar">
            <div class="reel-topic-icon" style="background:${topic.color}15;border:1px solid ${topic.color}25">${topic.icon}</div>
            <div><div class="reel-topic-name" style="color:${topic.color}">${topic.label}${isFollowed?'':' <span style="font-size:9px;opacity:0.5;font-weight:400;letter-spacing:0">· discover</span>'}</div><div class="reel-topic-meta">${post.readTime||'5'} min read · ${post.difficulty||'Deep Dive'}</div></div>
            <span class="reel-difficulty" style="background:${topic.color}12;color:${topic.color};border:1px solid ${topic.color}20">${S.currentIndex+1}/${posts.length}</span>
          </div>
          <img class="reel-hero-image" src="${imgUrl}" alt="" onerror="this.style.display='none'" loading="eager">
          <h2 class="reel-title">${post.title}</h2>
          <div class="reel-body">${formatContent(post.content)}</div>
          <div style="height:100px;flex-shrink:0"></div>
        </div>
      </div>
    </div>
    <div class="reel-actions">
      <div class="reel-action-btn" onclick="toggleLike('${post.id}','${post.topicId}');render()"><div class="reel-action-icon ${isLkd?'liked':''}">${isLkd?'❤️':'🤍'}</div><span class="reel-action-label">${isLkd?'Liked':'Like'}</span></div>
      <div class="reel-action-btn" onclick="toggleSave('${post.id}');render()"><div class="reel-action-icon ${isSvd?'saved':''}">${isSvd?'🔖':'📑'}</div><span class="reel-action-label">${isSvd?'Saved':'Save'}</span></div>
      <div class="reel-action-btn" onclick="shareP('${post.id}')"><div class="reel-action-icon">↗️</div><span class="reel-action-label">Share</span></div>
    </div>
    ${!S.swipeHintShown&&posts.length>1?`<div class="swipe-hint"><span style="font-size:12px;color:var(--text-muted);font-weight:600">← swipe → to skip · ↑ at bottom for next</span></div>`:''}`}

window.shareP=function(id){const post=posts.find(p=>p.id===id);if(!post)return;const text=`${post.title}\n\n${(post.content||'').replace(/\*\*/g,'').replace(/`/g,'').replace(/##\s*/g,'').replace(/\[.*?\]/g,'').slice(0,400)}...`;if(navigator.share)navigator.share({title:post.title,text});else navigator.clipboard.writeText(text).then(()=>alert("Copied!"))};

// ── SWIPE ──
let tsx=0,tsy=0,tst=0,isw=false,swipeDir=null;
function initSwipe(){const el=document.getElementById("reelsC");if(!el)return;
  el.addEventListener("touchstart",e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;tst=Date.now();isw=true;swipeDir=null},{passive:true});
  el.addEventListener("touchmove",e=>{if(!isw||swipeDir)return;const dx=Math.abs(e.touches[0].clientX-tsx);const dy=Math.abs(e.touches[0].clientY-tsy);if(dx>10||dy>10)swipeDir=(dx>dy)?"horizontal":"vertical"},{passive:true});
  el.addEventListener("touchend",e=>{if(!isw)return;isw=false;const dx=tsx-e.changedTouches[0].clientX;const dy=tsy-e.changedTouches[0].clientY;const dt=Date.now()-tst;const vx=Math.abs(dx)/dt;const vy=Math.abs(dy)/dt;
    if(swipeDir==="horizontal"){if(dx>50&&(vx>0.25||dx>120))animateAndGo("next");else if(dx<-50&&(vx>0.25||dx<-120))animateAndGo("prev")}
    else if(swipeDir==="vertical"){const r=document.getElementById("curReel");const bot=r&&(r.scrollHeight-r.scrollTop-r.clientHeight<20);const top=r&&r.scrollTop<20;if(dy>60&&(vy>0.3||dy>150)&&bot)animateAndGo("next");else if(dy<-60&&(vy>0.3||dy<-150)&&top)animateAndGo("prev")}swipeDir=null},{passive:true});
  document.onkeydown=e=>{if(S.view!=="feed")return;if(e.key==="ArrowRight"||e.key==="ArrowDown"||e.key==="j")animateAndGo("next");if(e.key==="ArrowLeft"||e.key==="ArrowUp"||e.key==="k")animateAndGo("prev")};
  let wt;el.addEventListener("wheel",e=>{const r=document.getElementById("curReel");if(!r)return;const bot=r.scrollHeight-r.scrollTop-r.clientHeight<20;const top=r.scrollTop<20;if(e.deltaY>50&&bot){clearTimeout(wt);wt=setTimeout(()=>animateAndGo("next"),100)}else if(e.deltaY<-50&&top){clearTimeout(wt);wt=setTimeout(()=>animateAndGo("prev"),100)}},{passive:true})}

function animateAndGo(dir){if(dir==="next"&&S.currentIndex>=posts.length-1)return;if(dir==="prev"&&S.currentIndex<=0)return;const slide=document.getElementById("curReel");if(slide){slide.classList.add(dir==="next"?"slide-out-left":"slide-out-right");setTimeout(()=>{if(dir==="next")S.currentIndex++;else S.currentIndex--;S.swipeHintShown=true;S._slideFrom=dir;render()},200)}else{if(dir==="next")S.currentIndex++;else S.currentIndex--;S.swipeHintShown=true;render()}}
const _origRender=render;render=function(){_origRender();if(S._slideFrom&&S.view==="feed"){const slide=document.getElementById("curReel");if(slide){slide.classList.add(S._slideFrom==="next"?"slide-in-left":"slide-in-right");setTimeout(()=>slide.classList.remove("slide-in-left","slide-in-right"),400)}S._slideFrom=null}};

// ── SAVED ──
function renderSaved(){if(!S.savedPosts.length)return`<div class="page-container"><div class="empty-state"><div class="empty-state-icon">📚</div><div class="empty-state-title">No saved articles</div><div class="empty-state-desc">Tap save on any article to keep it here.</div></div></div>`;return`<div class="page-container"><div class="section-title">Saved · ${S.savedPosts.length}</div>${S.savedPosts.map(p=>{const t=TOPIC_MAP[p.topicId]||TOPICS[0];return`<div class="saved-card" onclick="openSvd('${p.id}')"><div class="saved-card-icon" style="background:${t.color}12;border:1px solid ${t.color}20">${t.icon}</div><div class="saved-card-info"><div class="saved-card-title">${p.title}</div><div class="saved-card-meta">${t.label} · ${p.difficulty||''} · ${new Date(p.savedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div></div><div class="saved-card-rm" onclick="event.stopPropagation();rmSvd('${p.id}')">✕</div></div>`}).join("")}</div>`}
window.openSvd=function(id){let idx=posts.findIndex(p=>p.id===id);if(idx<0){const s=S.savedPosts.find(p=>p.id===id);if(s){posts.push(s);idx=posts.length-1}}if(idx>=0){S.currentIndex=idx;S.view="feed";render()}};
window.rmSvd=function(id){S.savedPosts=S.savedPosts.filter(p=>p.id!==id);saveUserData();render()};

// ── EXPLORE ──
function renderExplore(){const q=S._exQ.toLowerCase();const sub=TOPICS.filter(t=>S.topics.includes(t.id));const unsub=TOPICS.filter(t=>!S.topics.includes(t.id));const all=[...sub,...unsub].filter(t=>!q||t.label.toLowerCase().includes(q)||t.id.includes(q)||t.category.toLowerCase().includes(q));
  let h=`<div class="page-container"><div class="explore-search"><span style="color:var(--text-muted)">🔍</span><input type="text" placeholder="Search ${TOPICS.length} topics..." value="${S._exQ}" oninput="S._exQ=this.value;render()"></div><div class="section-title">Your Topics · ${S.topics.length} active</div><div class="topic-grid">`;
  for(const t of all.slice(0,50)){const s=S.topics.includes(t.id);const w=S.weights[t.id]||0;
    h+=`<div class="tcard ${s?'sub':''}" onclick="togT('${t.id}')"><div class="tcard-chk">${s?'✓':''}</div><div style="font-size:24px;margin-bottom:6px">${t.icon}</div><div style="font-size:12px;font-weight:700;margin-bottom:2px;color:${s?t.color:'var(--text-dim)'}">${t.label}</div><div style="font-size:10px;color:var(--text-dim)">${s?(w>1.2?'🌟 Favorite':'Active'):'Tap to add'}</div>${s?`<div style="margin-top:6px;height:3px;border-radius:2px;background:var(--border);overflow:hidden"><div style="height:100%;width:${Math.min(w/3*100,100)}%;background:${t.color};border-radius:2px"></div></div>`:''}</div>`}
  h+=`</div><div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:18px;margin:12px 0;box-shadow:var(--shadow)"><div style="font-size:15px;font-weight:700;font-family:'Lora',Georgia,serif;margin-bottom:8px">🌿 How Your Garden Grows</div><p style="font-size:13px;color:var(--text-dim);line-height:1.7">30 new articles bloom daily. <strong style="color:var(--text)">Your topics appear first</strong>, sorted by preference. Articles you like & save get a 🌟 boost. Everyone sees all articles — yours are just prioritized.</p></div><div style="text-align:center;margin-top:20px;color:var(--text-muted);font-size:11px">InfoGram v5 · ${TOPICS.length} Topics · ${user.username}</div></div>`;return h}
window.togT=function(id){const i=S.topics.indexOf(id);if(i>=0){if(S.topics.length<=1)return;S.topics.splice(i,1);delete S.weights[id]}else{S.topics.push(id);S.weights[id]=1}saveUserData();sortPostsForUser();render()};

// ── INIT ──
const cur=localStorage.getItem("ig-current");
if(cur){user={username:cur};loadUserData();loadPosts()}else render();
</script>
</body>
