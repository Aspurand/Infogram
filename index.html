<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BookGram">
<meta name="theme-color" content="#f4f1eb">
<title>BookGram</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f4f1eb;--bg-card:#ffffff;--bg-card-hover:#f7f5f0;--bg-input:#ffffff;
  --border:#e0dbd2;--border-strong:#c8c2b6;
  --text:#2c3327;--text-dim:#5c6b56;--text-muted:#94a08e;--text-body:#4a5544;
  --accent:#3d8b37;--accent-light:#4ea648;--accent-glow:rgba(61,139,55,0.12);--accent-soft:rgba(61,139,55,0.06);
  --red:#c0392b;--amber:#b8860b;
  --shadow:0 1px 8px rgba(44,51,39,0.06);--shadow-lg:0 6px 24px rgba(44,51,39,0.1);
  --bar-bg:rgba(244,241,235,0.94);
  --hero-fallback:linear-gradient(135deg,#e8f5e9,#f1f8e9,#fefcf3);
  --formula-bg:#f0f7ef;--formula-border:#d4e6d2;--formula-text:#2d6a2e;
  --insight-bg:linear-gradient(135deg,#f0f7ef,#f8faf5);--insight-border:#c8e0c5;
  --code-bg:#eef5ed;--code-border:#d4e6d2;--code-text:#2d6a2e;
  --toggle-bg:#e0dbd2;--toggle-fg:#ffffff;
}

/* ── DARK THEME ── */
[data-theme="dark"]{
  --bg:#1a1f1a;--bg-card:#242b24;--bg-card-hover:#2c352c;--bg-input:#242b24;
  --border:#3a4a3a;--border-strong:#4a5c4a;
  --text:#e0e8dc;--text-dim:#a0b49a;--text-muted:#687868;--text-body:#bcc8b8;
  --accent:#6abf62;--accent-light:#7ed476;--accent-glow:rgba(106,191,98,0.15);--accent-soft:rgba(106,191,98,0.06);
  --red:#ff6b6b;--amber:#ffd43b;
  --shadow:0 1px 8px rgba(0,0,0,0.2);--shadow-lg:0 6px 24px rgba(0,0,0,0.3);
  --bar-bg:rgba(26,31,26,0.94);
  --hero-fallback:linear-gradient(135deg,#1e2a1e,#242b24,#2a2a1e);
  --formula-bg:rgba(106,191,98,0.06);--formula-border:rgba(106,191,98,0.15);--formula-text:#7ed476;
  --insight-bg:linear-gradient(135deg,rgba(106,191,98,0.07),rgba(106,191,98,0.02));--insight-border:rgba(106,191,98,0.2);
  --code-bg:rgba(106,191,98,0.08);--code-border:rgba(106,191,98,0.12);--code-text:#7ed476;
  --toggle-bg:#3a4a3a;--toggle-fg:#6abf62;
}

:root{--radius:16px;--radius-sm:12px;--header-h:56px;--nav-h:60px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;transition:background 0.4s ease,color 0.4s ease}
::-webkit-scrollbar{display:none}*{scrollbar-width:none}
#app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ── AUTH ── */
.auth-screen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;text-align:center}
.auth-logo{font-size:52px;margin-bottom:12px}
.auth-title{font-size:32px;font-weight:700;font-family:'Lora',Georgia,serif;color:var(--accent);margin-bottom:2px}
.auth-sub{font-size:14px;color:var(--text-dim);margin-bottom:32px;line-height:1.6}
.auth-form{width:100%;max-width:340px}
.auth-input{width:100%;padding:14px 18px;background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'Nunito',sans-serif;font-size:16px;outline:none;transition:all 0.3s;margin-bottom:12px;-webkit-appearance:none;box-shadow:var(--shadow)}
.auth-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.auth-input::placeholder{color:var(--text-muted)}
.auth-btn{width:100%;padding:15px;border:none;border-radius:50px;background:var(--accent);color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s;box-shadow:var(--shadow-lg);margin-top:4px}
.auth-btn:active{transform:scale(0.97)}
.auth-toggle{margin-top:18px;font-size:13px;color:var(--text-dim)}
.auth-toggle span{color:var(--accent);cursor:pointer;font-weight:700}
.auth-error{color:var(--red);font-size:13px;margin-bottom:10px;min-height:18px}

/* ── HEADER ── */
.header{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;height:calc(var(--header-h) + var(--safe-top));padding-top:var(--safe-top);background:var(--bar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:50}
.header-left{display:flex;align-items:center;gap:8px}
.header-left h1{font-size:20px;font-weight:700;font-family:'Lora',Georgia,serif;color:var(--accent)}
.header-right{display:flex;gap:6px;align-items:center}
.hdr-btn{height:34px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;padding:0 12px;gap:5px;font-family:'Nunito',sans-serif;font-weight:700;box-shadow:var(--shadow);transition:all 0.2s}
.hdr-btn:active{transform:scale(0.94)}
.hdr-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}

/* ── THEME TOGGLE ── */
.theme-toggle{width:34px;height:34px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;box-shadow:var(--shadow);transition:all 0.2s}
.theme-toggle:active{transform:scale(0.9)}

/* ── BOTTOM NAV ── */
.bottom-nav{flex-shrink:0;display:flex;justify-content:space-around;align-items:center;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--bar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 18px;cursor:pointer;border-radius:14px;position:relative;transition:all 0.2s}
.nav-item:active{transform:scale(0.9)}
.nav-icon{font-size:22px}
.nav-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:0.3px}
.nav-item.active{background:var(--accent-soft)}
.nav-item.active .nav-label{color:var(--accent)}
.saved-count{position:absolute;top:0;right:8px;min-width:16px;height:16px;border-radius:8px;background:var(--red);color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

.main{flex:1;overflow:hidden;position:relative}

/* ── READER ── */
.reader{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch}
.reader::-webkit-scrollbar{display:none}
.reader-inner{max-width:640px;margin:0 auto;padding:20px 22px 100px}

.book-hero-img{width:calc(100% + 44px);margin:-20px -22px 24px;height:240px;object-fit:cover;background:var(--hero-fallback)}
.book-category{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px}
.book-title{font-size:30px;font-weight:700;font-family:'Lora',Georgia,serif;line-height:1.25;letter-spacing:-0.3px;margin-bottom:6px}
.book-author{font-size:16px;color:var(--text-dim);font-weight:500;margin-bottom:4px}
.book-meta{font-size:13px;color:var(--text-muted);margin-bottom:6px;display:flex;gap:12px;flex-wrap:wrap}
.book-oneliner{font-size:15px;color:var(--text-dim);font-style:italic;font-family:'Lora',Georgia,serif;line-height:1.6;margin:16px 0 24px;padding:16px 20px;border-left:3px solid var(--accent);background:var(--accent-soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0}

/* ── READING TYPOGRAPHY ── */
.book-body p{margin-bottom:18px;font-size:16.5px;line-height:1.9;color:var(--text-body);font-family:'Lora',Georgia,serif;font-weight:400}
.book-body h2{font-size:22px;font-weight:700;font-family:'Lora',Georgia,serif;color:var(--text);margin:36px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.book-body h3{font-size:18px;font-weight:600;font-family:'Lora',Georgia,serif;color:var(--text);margin:28px 0 10px;padding-left:14px;border-left:3px solid var(--accent)}
.book-body strong{color:var(--text);font-weight:600}
.book-body em{font-style:italic;color:var(--text-dim)}
.book-body code{background:var(--code-bg);padding:3px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--code-text);border:1px solid var(--code-border)}
.book-body .formula-block{background:var(--formula-bg);border:1px solid var(--formula-border);border-radius:var(--radius-sm);padding:18px 20px;margin:20px 0;font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--formula-text);line-height:1.9}
.book-body .key-insight{background:var(--insight-bg);border:1px solid var(--insight-border);border-radius:var(--radius-sm);padding:20px;margin:22px 0;font-size:15.5px;line-height:1.8;font-family:'Lora',Georgia,serif}
.book-body .key-insight::before{content:'🌿 Key Insight';display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.8px;color:var(--accent);margin-bottom:10px;font-family:'Nunito',sans-serif}

/* ── ACTIONS BAR (bottom of article) ── */
.book-actions{display:flex;gap:10px;margin-top:32px;padding-top:20px;border-top:1px solid var(--border)}
.book-action{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:700;color:var(--text-dim);font-family:'Nunito',sans-serif;box-shadow:var(--shadow);transition:all 0.2s}
.book-action:active{transform:scale(0.96)}
.book-action.liked{color:var(--red);border-color:rgba(192,57,43,0.3);background:rgba(192,57,43,0.05)}
.book-action.saved{color:var(--amber);border-color:rgba(184,134,11,0.3);background:rgba(184,134,11,0.05)}

/* ── DATE NAV ── */
.date-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:10px 16px;flex-shrink:0}
.date-btn{width:34px;height:34px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;box-shadow:var(--shadow)}
.date-btn:active{background:var(--bg-card-hover)}
.date-btn:disabled{opacity:0.2;cursor:default}
.date-label{font-size:14px;font-weight:600;color:var(--text-dim)}
.date-label strong{color:var(--text)}

/* ── SAVED / LIBRARY ── */
.page-container{height:100%;overflow-y:auto;padding:20px 18px}
.page-container::-webkit-scrollbar{display:none}
.section-title{font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.saved-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;cursor:pointer;display:flex;gap:14px;box-shadow:var(--shadow);transition:all 0.2s}
.saved-card:active{transform:scale(0.98);background:var(--bg-card-hover)}
.saved-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.saved-card-info{flex:1;min-width:0}
.saved-card-title{font-size:15px;font-weight:700;font-family:'Lora',Georgia,serif;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saved-card-author{font-size:12px;color:var(--text-dim);font-weight:500}
.saved-card-meta{font-size:11px;color:var(--text-muted);margin-top:2px}
.saved-card-rm{align-self:center;color:var(--text-muted);font-size:18px;cursor:pointer;padding:6px;border-radius:8px}

/* ── EMPTY / LOADING ── */
.loading-reel{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:40px}
.empty-state{text-align:center;padding:60px 24px}
.empty-state-icon{font-size:48px;margin-bottom:14px}
.empty-state-title{font-size:18px;font-weight:700;font-family:'Lora',Georgia,serif;color:var(--text-dim);margin-bottom:7px}
.empty-state-desc{font-size:13px;color:var(--text-muted);line-height:1.6}

@media(min-width:640px){.reader-inner{padding:28px 32px 100px}}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// BOOKGRAM — Daily Book Summary Reader
// ═══════════════════════════════════════════════════════════════

const CATEGORY_COLORS={"Self Help":"#3d8b37","Motivation":"#e17055","Investing":"#2e86ab","Leadership":"#8e44ad","Business Strategy":"#d4a017","Supply Chain":"#1abc9c"};

// ── THEME ──
function getTheme(){return localStorage.getItem("bg-theme")||"light"}
function setTheme(t){localStorage.setItem("bg-theme",t);document.documentElement.setAttribute("data-theme",t);document.querySelector('meta[name="theme-color"]').content=t==="dark"?"#1a1f1a":"#f4f1eb"}
function toggleTheme(){setTheme(getTheme()==="light"?"dark":"light");render()}
setTheme(getTheme());

// ── STATE ──
let user=null;
let S={view:"read",savedPosts:[],likedIds:new Set()};
let posts=[];let loadedDate="";

// ── AUTH ──
function hashPw(pw){let h=0;for(let i=0;i<pw.length;i++)h=((h<<5)-h+pw.charCodeAt(i))|0;return h.toString(36)}
function getUsers(){try{return JSON.parse(localStorage.getItem("bg-users")||"{}")}catch(e){return{}}}
function saveUsers(u){localStorage.setItem("bg-users",JSON.stringify(u))}
function login(username,password){const users=getUsers();const h=hashPw(password);if(users[username]&&users[username].hash!==h)return"Wrong password";if(!users[username])users[username]={hash:h,created:Date.now()};saveUsers(users);user={username};localStorage.setItem("bg-current",username);loadUserData();return null}
function logout(){user=null;localStorage.removeItem("bg-current");render()}
function loadUserData(){if(!user)return;try{const d=JSON.parse(localStorage.getItem("bg-u-"+user.username)||"{}");S.savedPosts=d.saved||[];S.likedIds=new Set(d.liked||[])}catch(e){}}
function saveUserData(){if(!user)return;localStorage.setItem("bg-u-"+user.username,JSON.stringify({saved:S.savedPosts,liked:[...S.likedIds]}))}

// ── POSTS ──
function todayStr(){return new Date().toISOString().slice(0,10)}
function dateStr(offset){const d=new Date();d.setDate(d.getDate()+offset);return d.toISOString().slice(0,10)}
async function loadPosts(date){if(!date)date=todayStr();loadedDate=date;try{const r=await fetch(`posts/${date}.json?v=${Date.now()}`);if(!r.ok)throw 0;posts=await r.json()}catch(e){if(date===todayStr()){try{const r2=await fetch(`posts/${dateStr(-1)}.json?v=${Date.now()}`);if(r2.ok){posts=await r2.json();loadedDate=dateStr(-1)}else posts=[]}catch(e2){posts=[]}}else posts=[]}render()}

// ── ACTIONS ──
function toggleLike(id){if(S.likedIds.has(id))S.likedIds.delete(id);else S.likedIds.add(id);saveUserData();render()}
function toggleSave(id){if(S.savedPosts.find(p=>p.id===id)){S.savedPosts=S.savedPosts.filter(p=>p.id!==id)}else{const post=posts.find(p=>p.id===id);if(post)S.savedPosts.unshift({...post,savedAt:Date.now()})}saveUserData();render()}

function formatContent(text){if(!text)return"";return text.replace(/\[FORMULA\]([\s\S]*?)\[\/FORMULA\]/g,'<div class="formula-block">$1</div>').replace(/\[INSIGHT\]([\s\S]*?)\[\/INSIGHT\]/g,'<div class="key-insight">$1</div>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').split("\n").filter(l=>l.trim()).map(l=>{const t=l.trim();if(t.startsWith("<h")||t.startsWith("<div"))return t;return"<p>"+t+"</p>"}).join("")}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════

function render(){const app=document.getElementById("app");if(!user){renderAuth(app);return}renderApp(app)}

let authMode="login",authErr="";
function renderAuth(app){
  app.innerHTML=`<div class="auth-screen">
    <div class="auth-logo">📖</div>
    <h1 class="auth-title">BookGram</h1>
    <p class="auth-sub">One brilliant book summary every day.<br>20-minute deep reads that change how you think.</p>
    <div class="auth-form">
      <div class="auth-error">${authErr}</div>
      <input class="auth-input" id="authUser" type="text" placeholder="Username" autocomplete="username" autofocus>
      <input class="auth-input" id="authPw" type="password" placeholder="Password" autocomplete="current-password">
      <button class="auth-btn" onclick="doAuth()">${authMode==="login"?"Sign In":"Create Account"}</button>
      <div class="auth-toggle">${authMode==="login"?`New here? <span onclick="authMode='signup';authErr='';render()">Create account</span>`:`Have an account? <span onclick="authMode='login';authErr='';render()">Sign in</span>`}</div>
    </div>
    <div style="position:fixed;top:16px;right:16px"><div class="theme-toggle" onclick="toggleTheme()">${getTheme()==="light"?"🌙":"☀️"}</div></div>
  </div>`;
  document.getElementById("authPw").addEventListener("keydown",e=>{if(e.key==="Enter")doAuth()})
}

window.doAuth=function(){const u=document.getElementById("authUser").value.trim().toLowerCase();const p=document.getElementById("authPw").value;if(!u||u.length<2){authErr="Username must be at least 2 characters";render();return}if(!p||p.length<3){authErr="Password must be at least 3 characters";render();return}const users=getUsers();if(authMode==="signup"&&users[u]){authErr="Username taken. Try signing in.";render();return}if(authMode==="login"&&!users[u]){authErr="No account found. Create one first.";render();return}const err=login(u,p);if(err){authErr=err;render();return}authErr="";loadPosts()};

function renderApp(app){const v=S.view;
  app.innerHTML=`
    <div class="header">
      <div class="header-left"><span style="font-size:22px">📖</span><h1>BookGram</h1></div>
      <div class="header-right">
        <div class="theme-toggle" onclick="toggleTheme()">${getTheme()==="light"?"🌙":"☀️"}</div>
        <div class="hdr-btn" onclick="logout()"><div class="hdr-avatar">${user.username[0].toUpperCase()}</div><span style="font-size:11px;color:var(--text-muted)">✕</span></div>
      </div>
    </div>
    ${v==="read"?renderDateNav():''}
    <div class="main">${v==="read"?renderReader():''}${v==="saved"?renderSaved():''}</div>
    <div class="bottom-nav">
      <div class="nav-item ${v==="read"?'active':''}" onclick="S.view='read';render()"><span class="nav-icon">📖</span><span class="nav-label">Today</span></div>
      <div class="nav-item ${v==="saved"?'active':''}" onclick="S.view='saved';render()" style="position:relative"><span class="nav-icon">🔖</span><span class="nav-label">Library</span>${S.savedPosts.length?`<span class="saved-count">${S.savedPosts.length}</span>`:''}</div>
    </div>`}

function renderDateNav(){const isToday=loadedDate===todayStr();const d=new Date(loadedDate+"T12:00:00");const label=isToday?"Today's Read":d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});return`<div class="date-nav"><button class="date-btn" onclick="goDate(-1)">‹</button><div class="date-label"><strong>${label}</strong></div><button class="date-btn" onclick="goDate(1)" ${isToday?'disabled':''}>›</button></div>`}
window.goDate=function(dir){const d=new Date(loadedDate+"T12:00:00");d.setDate(d.getDate()+dir);const ds=d.toISOString().slice(0,10);if(ds>todayStr())return;loadPosts(ds)};

function renderReader(){
  if(!posts.length)return`<div class="loading-reel"><div class="empty-state-icon">📚</div><div class="empty-state-title">No summary for this date</div><div class="empty-state-desc">Try going back a day — a new summary<br>is generated every morning.</div></div>`;

  const post=posts[0];
  const color=post.color||CATEGORY_COLORS[post.category]||"#3d8b37";
  const isLkd=S.likedIds.has(post.id);const isSvd=S.savedPosts.some(p=>p.id===post.id);
  const imgQ=post.imageQuery||"books+reading+cozy";
  const imgUrl=post.imageUrl||`https://source.unsplash.com/800x480/?${encodeURIComponent(imgQ)}&sig=${encodeURIComponent(post.id)}`;

  return`<div class="reader"><div class="reader-inner">
    <img class="book-hero-img" src="${imgUrl}" alt="" onerror="this.style.display='none'" loading="eager">
    <div class="book-category" style="background:${color}12;color:${color};border:1px solid ${color}25">${post.icon||'📖'} ${post.category}</div>
    <h1 class="book-title">${post.title}</h1>
    <div class="book-author">by ${post.author} · ${post.year||''}</div>
    <div class="book-meta"><span>📖 ${post.readTime||'20'} min read</span><span>⭐ ${post.rating||'5'}/5</span></div>
    ${post.oneLiner?`<div class="book-oneliner">${post.oneLiner}</div>`:''}
    <div class="book-body">${formatContent(post.content)}</div>
    <div class="book-actions">
      <div class="book-action ${isLkd?'liked':''}" onclick="toggleLike('${post.id}')">${isLkd?'❤️ Liked':'🤍 Like'}</div>
      <div class="book-action ${isSvd?'saved':''}" onclick="toggleSave('${post.id}')">${isSvd?'🔖 Saved':'📑 Save to Library'}</div>
      <div class="book-action" onclick="shareP('${post.id}')">↗ Share</div>
    </div>
  </div></div>`}

window.shareP=function(id){const post=posts.find(p=>p.id===id)||S.savedPosts.find(p=>p.id===id);if(!post)return;const text=`📖 ${post.title} by ${post.author}\n\n${post.oneLiner||''}\n\nRead the full summary on BookGram`;if(navigator.share)navigator.share({title:post.title,text});else navigator.clipboard.writeText(text).then(()=>alert("Copied!"))};

function renderSaved(){
  if(!S.savedPosts.length)return`<div class="page-container"><div class="empty-state"><div class="empty-state-icon">📚</div><div class="empty-state-title">Your library is empty</div><div class="empty-state-desc">Save book summaries to build your<br>personal knowledge library.</div></div></div>`;
  return`<div class="page-container"><div class="section-title">Your Library · ${S.savedPosts.length} books</div>${S.savedPosts.map(p=>{
    const color=p.color||CATEGORY_COLORS[p.category]||"#3d8b37";
    return`<div class="saved-card" onclick="openSvd('${p.id}')"><div class="saved-card-icon" style="background:${color}10;border:1px solid ${color}20">${p.icon||'📖'}</div><div class="saved-card-info"><div class="saved-card-title">${p.title}</div><div class="saved-card-author">by ${p.author}</div><div class="saved-card-meta">${p.category} · ${new Date(p.savedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div></div><div class="saved-card-rm" onclick="event.stopPropagation();rmSvd('${p.id}')">✕</div></div>`}).join("")}</div>`}
window.openSvd=function(id){const s=S.savedPosts.find(p=>p.id===id);if(s){posts=[s];loadedDate="saved";S.view="read";render()}};
window.rmSvd=function(id){S.savedPosts=S.savedPosts.filter(p=>p.id!==id);saveUserData();render()};

// ── INIT ──
const cur=localStorage.getItem("bg-current");
if(cur){user={username:cur};loadUserData();loadPosts()}else render();
</script>
</body>
</html>
