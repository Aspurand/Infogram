name: Daily Knowledge Feed

on:
  schedule:
    # Runs at midnight UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate daily posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python -u generate.py

      - name: Commit and push new posts
        run: |
          git config user.name "InfoGram Bot"
          git config user.email "bot@infogram.app"
          git add posts/
          DATE=$(date +%Y-%m-%d)
          git commit -m "📚 Daily feed: ${DATE}" || echo "No changes to commit"
          git push
